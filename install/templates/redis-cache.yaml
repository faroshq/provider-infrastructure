apiVersion: infrastructure.kedge.faros.sh/v1alpha1
kind: Template
metadata:
  name: redis-cache
spec:
  displayName: "Redis cache"
  description: "A Redis instance for caching workloads — StatefulSet + Service; the size knob picks the memory bucket. Ephemeral: data does not survive a restart."
  category: Databases
  version: 0.2.0
  backend: kro
  sampleValues:
    name: cache
    size: small
  # Operational guidance for AI agents discovering this template over MCP —
  # same convention as the database template.
  agent:
    usage: |
      Provisions only a Redis instance: a credentials Secret, password
      generator Job, StatefulSet, and ClusterIP Service. Choose this when an
      app already has a runtime or development environment and needs a
      standalone cache or ephemeral key-value store, without deploying a new
      web app stack.

      Consumers read the full connection URI from Secret
      `<name>-credentials`, key `uri`. The URI has the form
      `redis://:<password>@<name>:6379`. Redis may not be ready the moment a
      consuming app starts — retry the initial connection. This template does
      not expose Redis publicly.

      Redis is EPHEMERAL here: no persistence is configured, so a pod restart
      loses all data. Treat it strictly as a cache — never as a system of
      record; durable state belongs in the database template. The size input
      picks the container memory bucket: small=64Mi, medium=256Mi, large=1Gi.
    outputs:
      - "status.host / status.port — the in-cluster Service endpoint for Redis."
      - "status.ready — ready replica count for the Redis StatefulSet."
      - "status.connectionSecretRef — Secret '<name>-credentials' containing host, port, password, and uri keys. Secret values are not surfaced in status."
  # ── Portal presentation ───────────────────────────────────────────────
  view:
    columns:
      - header: Size
        path: spec.size
        type: badge
    detail:
      - title: Connection
        fields:
          - label: Host
            path: status.host
            type: code
          - label: Port
            path: status.port
            type: code
          - label: Credentials secret
            path: status.connectionSecretRef.name
            type: code
      - title: Configuration
        fields:
          - label: Size
            path: spec.size
            type: badge
          - label: Redis version
            path: spec.version
            type: badge
      - title: Readiness
        fields:
          - label: Redis
            path: status.ready
  instanceCRD:
    group: infrastructure.kedge.faros.sh
    version: v1alpha1
    resource: rediscaches
    kind: RedisCache
  schema:
    type: object
    properties:
      name:
        type: string
        description: "Logical name; used as Deployment + Service name in the tenant namespace."
      size:
        type: string
        enum: ["small", "medium", "large"]
        default: "small"
        description: "Memory bucket, wired to the container's memory request+limit (small=64Mi, medium=256Mi, large=1Gi)."
      version:
        type: string
        enum: ["6", "7"]
        default: "7"
    required:
      - name
  # backendConfig is interpreted by the kro backend. Every resource sets
  # namespace: default — the control-plane/data-plane split materializes
  # these on the runtime cluster and remaps that to a per-tenant namespace
  # (<logicalcluster>-default), so a tenant's whole stack (redis + the apps
  # that consume it) lands together and is isolated from other tenants.
  backendConfig:
    resources:
      # The connection Secret. kro creates it with the non-sensitive
      # connection details; the generator Job below fills in a random
      # password + full URI. Lives on the runtime cluster next to the
      # workload — its values never reach the control plane.
      - id: credentials
        template:
          apiVersion: v1
          kind: Secret
          metadata:
            name: ${schema.spec.name}-credentials
            namespace: default
          stringData:
            host: ${schema.spec.name}
            port: "6379"
      # Password generation, in-graph (no external operator). A one-shot
      # Job mints a random password and patches it (plus a complete
      # redis://:<pw>@host:port URI) into the credentials Secret — once;
      # it no-ops if the password key already exists, so re-reconciles
      # don't rotate it. kro never sees the value (the Job runs the shell);
      # status only ever references the Secret.
      - id: pwgenAccount
        template:
          apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: ${schema.spec.name}-pwgen
            namespace: default
      - id: pwgenRole
        template:
          apiVersion: rbac.authorization.k8s.io/v1
          kind: Role
          metadata:
            name: ${schema.spec.name}-pwgen
            namespace: default
          rules:
            - apiGroups: [""]
              resources: ["secrets"]
              verbs: ["get", "patch"]
      - id: pwgenBinding
        template:
          apiVersion: rbac.authorization.k8s.io/v1
          kind: RoleBinding
          metadata:
            name: ${schema.spec.name}-pwgen
            namespace: default
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: Role
            name: ${pwgenRole.metadata.name}
          subjects:
            - kind: ServiceAccount
              name: ${pwgenAccount.metadata.name}
              namespace: default
      - id: pwgen
        template:
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: ${schema.spec.name}-pwgen
            namespace: default
          spec:
            backoffLimit: 5
            ttlSecondsAfterFinished: 600
            template:
              spec:
                serviceAccountName: ${pwgenAccount.metadata.name}
                restartPolicy: OnFailure
                containers:
                  - name: pwgen
                    image: bitnami/kubectl
                    command:
                      - /bin/sh
                      - -c
                      - |
                        set -eu
                        SECRET="${credentials.metadata.name}"
                        if [ -z "$(kubectl get secret "$SECRET" -o jsonpath='{.data.password}' 2>/dev/null)" ]; then
                          PW="$(LC_ALL=C tr -dc 'a-z0-9' </dev/urandom | head -c 24)"
                          kubectl patch secret "$SECRET" --type merge \
                            -p "{\"stringData\":{\"password\":\"$PW\",\"uri\":\"redis://:$PW@${schema.spec.name}:6379\"}}"
                          echo "generated credentials for $SECRET"
                        else
                          echo "credentials already present for $SECRET"
                        fi
      - id: statefulset
        template:
          apiVersion: apps/v1
          kind: StatefulSet
          metadata:
            name: ${schema.spec.name}
            namespace: default
          spec:
            serviceName: ${schema.spec.name}
            replicas: 1
            selector:
              matchLabels:
                app: ${schema.spec.name}
            template:
              metadata:
                labels:
                  app: ${schema.spec.name}
              spec:
                containers:
                  - name: redis
                    image: redis:${schema.spec.version}
                    # maxmemory sits ~25% under the container limit (working
                    # memory + fragmentation headroom) with LRU eviction, so
                    # a full cache evicts instead of OOM-killing the pod.
                    command:
                      - redis-server
                      - --requirepass
                      - $(REDIS_PASSWORD)
                      - --maxmemory
                      - '${schema.spec.size == "small" ? "48mb" : (schema.spec.size == "medium" ? "192mb" : "768mb")}'
                      - --maxmemory-policy
                      - allkeys-lru
                    env:
                      - name: REDIS_PASSWORD
                        valueFrom:
                          secretKeyRef:
                            name: ${credentials.metadata.name}
                            key: password
                    ports:
                      - containerPort: 6379
                    # The size bucket bounds the container: memory request ==
                    # limit (Redis is memory, an OOM-kill under the limit is
                    # the contract working). Single-quoted: the CEL ternaries
                    # contain ": " which YAML would otherwise read as mappings.
                    resources:
                      requests:
                        cpu: 50m
                        memory: '${schema.spec.size == "small" ? "64Mi" : (schema.spec.size == "medium" ? "256Mi" : "1Gi")}'
                      limits:
                        memory: '${schema.spec.size == "small" ? "64Mi" : (schema.spec.size == "medium" ? "256Mi" : "1Gi")}'
      - id: service
        template:
          apiVersion: v1
          kind: Service
          metadata:
            name: ${schema.spec.name}
            namespace: default
          spec:
            type: ClusterIP
            selector:
              app: ${schema.spec.name}
            ports:
              - port: 6379
                targetPort: 6379
    # status is projected onto the instance in the tenant's kcp workspace
    # (via the split's instance client). Non-sensitive connection details +
    # a reference to the credentials Secret — no credentials are ever
    # surfaced to the user or an LLM.
    status:
      ready: ${statefulset.status.readyReplicas}
      host: ${service.metadata.name}
      port: ${service.spec.ports[0].port}
      connectionSecretRef:
        name: ${credentials.metadata.name}
        namespace: ${credentials.metadata.namespace}
