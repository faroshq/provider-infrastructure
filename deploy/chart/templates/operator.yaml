{{- if .Values.operator.enabled -}}
# CRD-driven operator: a controller-manager that reconciles
# InfrastructureProvider CRs — bootstraps the provider kcp workspace,
# lifecycles the kro Helm release, and owns the provider serve Deployment.
# It reads the provider + runtime kubeconfigs from Secrets referenced by the CR.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "infrastructure.fullname" . }}-operator
  labels:
    {{- include "infrastructure.labels" . | nindent 4 }}
    app.kubernetes.io/component: operator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "infrastructure.fullname" . }}-operator
  labels:
    {{- include "infrastructure.labels" . | nindent 4 }}
rules:
  # Watch + status the CRs.
  - apiGroups: ["infrastructure.kedge.faros.sh"]
    resources: ["infrastructureproviders"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["infrastructure.kedge.faros.sh"]
    resources: ["infrastructureproviders/status"]
    verbs: ["get", "update", "patch"]
  # Read the kubeconfig / hub-token Secrets the CR references.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "infrastructure.fullname" . }}-operator
  labels:
    {{- include "infrastructure.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "infrastructure.fullname" . }}-operator
subjects:
  - kind: ServiceAccount
    name: {{ include "infrastructure.fullname" . }}-operator
    namespace: {{ .Release.Namespace }}
{{- if .Values.operator.clusterAdmin }}
---
# The operator helm-installs the kro chart (which creates ClusterRoles, CRDs and
# cluster-scoped objects) and, for the in-cluster runtime, manages namespaces,
# Secrets, Deployments + the serve SA/binding on its own cluster — so its SA
# needs cluster-admin. Set operator.clusterAdmin=false to bind a narrower role
# yourself (e.g. when an explicit runtimeKubeconfig with its own creds is used).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "infrastructure.fullname" . }}-operator-admin
  labels:
    {{- include "infrastructure.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: {{ include "infrastructure.fullname" . }}-operator
    namespace: {{ .Release.Namespace }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "infrastructure.fullname" . }}-operator
  labels:
    {{- include "infrastructure.labels" . | nindent 4 }}
    app.kubernetes.io/component: operator
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "infrastructure.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: operator
  template:
    metadata:
      labels:
        {{- include "infrastructure.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: operator
    spec:
      serviceAccountName: {{ include "infrastructure.fullname" . }}-operator
      containers:
        - name: operator
          image: "{{ .Values.operator.image.repository | default .Values.image.repository }}:{{ .Values.operator.image.tag | default .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["controller"]
          env:
            # Stamps spec.version on the CatalogEntry the operator applies, so
            # the portal shows the release version (the embedded manifest.yaml
            # only carries a 0.1.0 placeholder). Mirrors the chart-templated
            # catalogentry.yaml's {{ "{{ .Chart.AppVersion }}" }}.
            - name: KEDGE_PROVIDER_VERSION
              value: {{ .Chart.AppVersion | quote }}
            {{- include "infrastructure.validateSandboxImages" . }}
            {{- with .Values.sandboxRunner.runnerImage }}
            # Platform-owned SandboxRunner images. The operator forwards these to
            # the serve container it manages (see operator/serve.go); the kro
            # backend substitutes them for ${kedge.sandboxRunnerImage} /
            # ${kedge.sandboxTokenGeneratorImage}.
            - name: KEDGE_SANDBOX_RUNNER_IMAGE
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.sandboxRunner.tokenGeneratorImage }}
            - name: KEDGE_SANDBOX_TOKEN_GENERATOR_IMAGE
              value: {{ . | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.operator.resources | nindent 12 }}
{{- end }}
