apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "infrastructure.fullname" . }}
  labels:
    {{- include "infrastructure.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "infrastructure.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "infrastructure.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "infrastructure.serviceAccountName" . }}
      {{- $centralName := (include "infrastructure.centralKroSecretName" .) }}
      {{- if .Values.bootstrap.enabled }}
      {{- if not (include "infrastructure.bootstrapSecretName" .) }}
        {{- fail "bootstrap.enabled=true with kubeconfigSource=supplied requires bootstrap.kcpKubeconfig (inline) or bootstrap.kcpKubeconfigSecretRef.name" }}
      {{- end }}
      initContainers:
        - name: bootstrap
          image: "{{ .Values.image.repository }}:{{ default .Chart.AppVersion .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["init"]
          env:
            # init bootstraps the provider workspace using the SAME kubeconfig
            # the serve container runs with (mounted at the kedge path below).
            # hubMinted: the hub-delivered kedge-provider-kubeconfig, which is
            # cluster-admin in the provider workspace — enough to install CRDs,
            # the CachedResource, and the APIExport. supplied: your kcp config.
            - name: INFRASTRUCTURE_ADMIN_KUBECONFIG
              value: /var/run/secrets/kedge/kedge-provider-kubeconfig
            {{- if eq .Values.bootstrap.kubeconfigSource "supplied" }}
            # A supplied kubeconfig may be root-scoped, so retarget init at the
            # provider workspace. The hub-minted kubeconfig already targets it.
            - name: INFRASTRUCTURE_WORKSPACE_PATH
              value: {{ .Values.bootstrap.workspacePath | quote }}
            {{- end }}
            # init writes a throwaway file copy; keep it off the read-only root.
            - name: INFRASTRUCTURE_KUBECONFIG
              value: /tmp/infrastructure.kubeconfig
            {{- if $centralName }}
            - name: KRO_KUBECONFIG
              value: /var/run/secrets/kro/kubeconfig
            {{- end }}
            {{- if .Values.catalogEntry.enabled }}
            # The CatalogEntry is a kcp resource, so the chart cannot apply it to
            # the hosting cluster. It is rendered into a ConfigMap (mounted below)
            # and init self-registers it into the provider workspace via the
            # provider kubeconfig.
            - name: KEDGE_CATALOGENTRY_FILE
              value: /etc/kedge/catalogentry/catalogentry.yaml
            {{- end }}
          volumeMounts:
            - name: kedge-provider-kubeconfig
              mountPath: /var/run/secrets/kedge
              readOnly: true
            - name: tmp
              mountPath: /tmp
            {{- if $centralName }}
            - name: kro-kubeconfig
              mountPath: /var/run/secrets/kro
              readOnly: true
            {{- end }}
            {{- if .Values.catalogEntry.enabled }}
            - name: catalogentry
              mountPath: /etc/kedge/catalogentry
              readOnly: true
            {{- end }}
      {{- end }}
      containers:
        - name: provider
          image: "{{ .Values.image.repository }}:{{ default .Chart.AppVersion .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 20
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            periodSeconds: 5
          env:
            - name: PORT
              value: "8081"
            - name: KEDGE_HUB_URL
              value: {{ .Values.hub.url | quote }}
            - name: KEDGE_PROVIDER_NAME
              value: "infrastructure"
            {{- if .Values.hub.insecure }}
            - name: KEDGE_HUB_INSECURE
              value: "true"
            {{- end }}
            {{- if .Values.hub.tokenSecretRef.name }}
            - name: KEDGE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.hub.tokenSecretRef.name }}
                  key: {{ .Values.hub.tokenSecretRef.key }}
            {{- end }}
            - name: KEDGE_PROVIDER_KUBECONFIG
              value: /var/run/secrets/kedge/kedge-provider-kubeconfig
            {{- if $centralName }}
            - name: KRO_KUBECONFIG
              value: /var/run/secrets/kro/kubeconfig
            {{- end }}
            {{- with .Values.application.baseDomain }}
            # Enables the Application instance controller (fqdn stamp + OIDC
            # client-secret bridge). Without it (and KRO_KUBECONFIG) the
            # controller stays disabled. The zone apps are served under, e.g.
            # "apps.example.com".
            - name: KEDGE_APP_BASE_DOMAIN
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.application.ingressClass }}
            # Exposure-layer ingress class substituted into Application RGDs
            # (${kedge.ingressClass}); defaults to "cloudflare" in-binary.
            - name: KEDGE_INGRESS_CLASS
              value: {{ . | quote }}
            {{- end }}
          volumeMounts:
            - name: kedge-provider-kubeconfig
              mountPath: /var/run/secrets/kedge
              readOnly: true
            {{- if $centralName }}
            - name: kro-kubeconfig
              mountPath: /var/run/secrets/kro
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        {{- if .Values.bootstrap.enabled }}
        - name: tmp
          emptyDir: {}
        {{- end }}
        {{- if and .Values.bootstrap.enabled .Values.catalogEntry.enabled }}
        - name: catalogentry
          configMap:
            name: {{ include "infrastructure.fullname" . }}-catalogentry
        {{- end }}
        - name: kedge-provider-kubeconfig
          secret:
            {{- if .Values.bootstrap.enabled }}
            # init + serve share ONE kubeconfig (resolved by kubeconfigSource).
            # NOT optional: the pod waits for the Secret to exist — in hubMinted
            # mode that's the hub delivering kedge-provider-kubeconfig after it
            # reconciles the CatalogEntry, which is exactly the bootstrap
            # ordering we want.
            secretName: {{ include "infrastructure.bootstrapSecretName" . }}
            items:
              - key: {{ include "infrastructure.bootstrapSecretKey" . }}
                path: kedge-provider-kubeconfig
            {{- else }}
            # Hub-provisioned, no init container: optional so the pod stays
            # schedulable while the hub catalog controller mints the Secret.
            # The provider logs a warning and serves catalog reads; broker
            # writes 502 until the Secret appears.
            secretName: {{ .Values.providerKubeconfig.secretName }}
            optional: true
            items:
              - key: kubeconfig
                path: kedge-provider-kubeconfig
            {{- end }}
        {{- if $centralName }}
        - name: kro-kubeconfig
          secret:
            secretName: {{ $centralName }}
            items:
              - key: {{ include "infrastructure.centralKroSecretKey" . }}
                path: kubeconfig
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
