{{- /*
Renders the kcp admin kubeconfig Secret the bootstrap init container reads.
Only when bootstrap is enabled, the kubeconfig is supplied inline, AND no
external Secret reference is set. Inline mode is convenience-only; production
should set bootstrap.kcpKubeconfigSecretRef.name to a Secret managed outside
this chart's lifecycle.
*/ -}}
{{- if and .Values.bootstrap.enabled .Values.bootstrap.kcpKubeconfig (not .Values.bootstrap.kcpKubeconfigSecretRef.name) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-kcp-kubeconfig" (include "infrastructure.fullname" .) }}
  labels:
    {{- include "infrastructure.labels" . | nindent 4 }}
type: Opaque
stringData:
  kubeconfig: |-
{{ .Values.bootstrap.kcpKubeconfig | indent 4 }}
{{- end -}}
