{{- /*
Only render when the user supplied the kubeconfig inline AND did not
point us at an external Secret. Inline mode is convenience-only;
production should set centralKro.kubeconfigSecretRef.name to a
Secret managed outside this chart's lifecycle.
*/ -}}
{{- if and .Values.centralKro.kubeconfig (not .Values.centralKro.kubeconfigSecretRef.name) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-kro-kubeconfig" (include "infrastructure.fullname" .) }}
  labels:
    {{- include "infrastructure.labels" . | nindent 4 }}
type: Opaque
stringData:
  kubeconfig: |-
{{ .Values.centralKro.kubeconfig | indent 4 }}
{{- end -}}
