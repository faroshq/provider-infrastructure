# Provider — declarative provisioning record (admin.kedge.faros.sh, admin-only).
# The hub's Provider controller creates root:kedge:providers:infrastructure, its
# "provider" ServiceAccount, and the infrastructure-kubeconfig Secret in
# root:kedge:system:providers. The APIExport/schemas/bind-grant come from the
# provider's own `init`; routing/UI from the companion CatalogEntry in
# manifest.yaml.
apiVersion: admin.kedge.faros.sh/v1alpha1
kind: Provider
metadata:
  name: infrastructure
spec:
  displayName: "Application Templates"
