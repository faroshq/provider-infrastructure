# infrastructure provider — register with the kedge hub.
#
# Apply to the kcp workspace where the kedge.faros.sh APIExport is bound
# (typically root:kedge:providers when running embedded kcp for
# development):
#
#   kubectl --kubeconfig kcp-admin.kubeconfig apply -f manifest.yaml
#
# Phase 1 ships the skeleton only — schemas: [] keeps tenant workspaces
# free of provider CRDs while still creating the APIExport tenants
# APIBind to. Adding a TemplateInstance CRD here later is a non-breaking
# change.
#
# ════════════════════════════════════════════════════════════════════════
# Provider object reference — kind: CatalogEntry (providers.kedge.faros.sh)
#
# A CatalogEntry registers one provider ("plugin") with the kedge hub. The
# hub's catalog controller reconciles it into the provider sub-workspace
# root:kedge:providers:<name>, a ServiceAccount + runtime kubeconfig, the
# APIExport tenants APIBind to, and a routing entry backing
# /ui/providers/<name>/* and /services/providers/<name>/*.
#
# spec:
#   displayName              Title on the portal catalog card + side nav. [required]
#   description              Short blurb on the catalog card.
#   vendor                   Provider author.
#   version                  Provider/chart version (informational).
#   category                 Groups the entry under a portal nav heading.
#   iconURL                  Portal-relative icon path (served via the UI proxy).
#   serviceAccountNamespace  Host namespace the provider Deployment runs in;
#                            the hub writes kedge-provider-kubeconfig here.
#   ui:                      Micro-frontend (omit for a UI-less provider).
#     url                      Address the hub reverse-proxies for
#                              /ui/providers/<name>/* (exclusive with builtinRoute).
#     indexPath                Default landing path within the UI (default "/").
#     builtinRoute             Portal renders an in-tree route by this name
#                              instead of loading a bundle (first-party providers).
#     children[]               Sub-nav entries: {displayName, builtinRoute}.
#   backend:                 Custom HTTP backend (omit for CR-only providers).
#     url                      Address proxied at /services/providers/<name>/*
#                              (NOT for CRD traffic — CRs flow through kcp).
#     healthPath               GET path that gates the BackendHealthy status.
#   virtualWorkspace:        Advanced opt-in for custom non-CRD verbs (Phase 5).
#   apiExport:               The provider's kcp APIExport.
#     name                     Fully-qualified APIExport name tenants APIBind to.
#     permissionClaims[]       Access the provider needs in tenant workspaces:
#                              {resource, group, verbs, tenantScoped}. tenantScoped:
#                              true auto-accepts on Enable.
#     schemas[]                Inline APIResourceSchemas to install ({groupResource,
#                              body}); [] = pure broker, no CRDs leak to tenants.
# ════════════════════════════════════════════════════════════════════════
---
apiVersion: providers.kedge.faros.sh/v1alpha1
kind: CatalogEntry
metadata:
  name: infrastructure
spec:
  displayName: "Application Templates"
  description: "Provision applications and infrastructure from curated templates."
  vendor: "kedge"
  version: "0.1.0"
  category: "Workloads"
  iconURL: "/ui/providers/infrastructure/icon.svg"
  # Local dev (Tilt / Makefile): the provider binary runs on the host
  # at PORT=8082 — distinct from the quickstart provider's :8081 so
  # both can run side-by-side. For in-cluster deployment, change to
  # the Service DNS, e.g.
  # http://infrastructure.infrastructure.svc.cluster.local:8081.
  ui:
    url: "http://localhost:8082"
    indexPath: "/"
    # Sub-nav entries shown indented under "Application Templates" in
    # the portal side menu. The portal composes each child URL as
    # /providers/infrastructure/{builtinRoute}; the micro-frontend
    # reads the trailing segment off kedgeContext.subPath and routes
    # to the matching internal page. Mirrors kubernetes-edges → Workloads.
    children:
      - displayName: Templates
        builtinRoute: templates
      - displayName: Instances
        builtinRoute: instances
  backend:
    url: "http://localhost:8082"
    healthPath: "/healthz"
  apiExport:
    name: "infrastructure.providers.kedge.faros.sh"
    # secrets get/list/watch with tenantScoped: true is what lets the
    # provider read the per-tenant `cloud-credentials` Secret when
    # brokering a template (phase 3). tenantScoped: true triggers
    # auto-accept per docs/providers.md decision #9.
    permissionClaims:
      - resource: secrets
        verbs: [get, list, watch]
        tenantScoped: true
    # No static schemas. The hub catalog controller materializes an
    # APIExport with empty spec.resources; the provider binary's
    # startup adds the Template CRD entry itself (so it doesn't have
    # to ship its CRD body in this manifest), and the Template
    # controller adds per-template entries as operators apply
    # Templates. Both paths reuse the same APIResourceSchema mint +
    # APIExport upsert logic.
