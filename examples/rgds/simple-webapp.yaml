# Sample ResourceGraphDefinition that materializes as a SimpleWebApp.
#
# Bridged from the infrastructure upstream example
# (examples/multicluster/simple-webapp-rgd.yaml) with kedge labels +
# annotations added so the kedge infrastructure provider's catalog
# picks it up:
#
#   kedge.faros.sh/expose=true            → mandatory; gates visibility
#   kedge.faros.sh/template-name          → catalog slug (the URL segment)
#   kedge.faros.sh/template-version       → required by POST /api/instances
#   kedge.faros.sh/category, /cloud       → optional facet chips in UI
#   kedge.faros.sh/display-name           → human-readable name
#   kedge.faros.sh/description            → short blurb
#
# The provider's kro/templates.go reads exactly these keys (see
# the LabelExpose / AnnotationDisplayName etc constants in
# providers/infrastructure/kro/types.go).
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: simple-webapp
  labels:
    kedge.faros.sh/expose: "true"
    kedge.faros.sh/template-name: simple-webapp
    kedge.faros.sh/template-version: 0.1.0
    kedge.faros.sh/category: Workloads
    kedge.faros.sh/cloud: k8s
  annotations:
    kedge.faros.sh/display-name: "Simple webapp"
    kedge.faros.sh/description: "A web application — Deployment + Service, nginx by default. Scales via the replicas input."
spec:
  schema:
    apiVersion: v1alpha1
    kind: SimpleWebApp
    spec:
      name: string | required=true
      replicas: integer | default=1 minimum=1 maximum=10
      image: string | default="nginx:latest"
      port: integer | default=80
      serviceType: string | enum="ClusterIP,NodePort,LoadBalancer" default="ClusterIP"
    status:
      availableReplicas: ${deployment.status.availableReplicas}
      readyReplicas: ${deployment.status.readyReplicas}
      serviceEndpoint: ${service.spec.clusterIP}

  resources:
    - id: deployment
      template:
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: ${schema.spec.name}
        spec:
          replicas: ${schema.spec.replicas}
          selector:
            matchLabels:
              app: ${schema.spec.name}
          template:
            metadata:
              labels:
                app: ${schema.spec.name}
            spec:
              containers:
                - name: app
                  image: ${schema.spec.image}
                  ports:
                    - containerPort: ${schema.spec.port}
                  resources:
                    requests:
                      cpu: "50m"
                      memory: "64Mi"
                    limits:
                      cpu: "200m"
                      memory: "128Mi"

    - id: service
      template:
        apiVersion: v1
        kind: Service
        metadata:
          name: ${schema.spec.name}
        spec:
          type: ${schema.spec.serviceType}
          selector:
            app: ${schema.spec.name}
          ports:
            - port: ${schema.spec.port}
              targetPort: ${schema.spec.port}
